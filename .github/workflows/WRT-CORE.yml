
#云编译公用核心
name: WRT-CORE

on:
  workflow_call:
    inputs:
      WRT_CONFIG:
        required: true
        type: string
      WRT_THEME:
        required: true
        type: string
      WRT_NAME:
        required: true
        type: string
      WRT_SSID:
        required: true
        type: string
      WRT_WORD:
        required: true
        type: string
      WRT_IP:
        required: true
        type: string
      WRT_PW:
        required: true
        type: string
      WRT_REPO:
        required: true
        type: string
      WRT_BRANCH:
        required: true
        type: string
      WRT_SOURCE:
        required: true
        type: string
      WRT_PACKAGE:
        required: false
        type: string
      WRT_TEST:
        required: false
        type: string

env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
  WRT_CONFIG: ${{inputs.WRT_CONFIG}}
  WRT_THEME: ${{inputs.WRT_THEME}}
  WRT_NAME: ${{inputs.WRT_NAME}}
  WRT_SSID: ${{inputs.WRT_SSID}}
  WRT_WORD: ${{inputs.WRT_WORD}}
  WRT_IP: ${{inputs.WRT_IP}}
  WRT_PW: ${{inputs.WRT_PW}}
  WRT_REPO: ${{inputs.WRT_REPO}}
  WRT_BRANCH: ${{inputs.WRT_BRANCH}}
  WRT_SOURCE: ${{inputs.WRT_SOURCE}}
  WRT_PACKAGE: ${{inputs.WRT_PACKAGE}}
  WRT_TEST: ${{inputs.WRT_TEST}}

jobs:
  core:
    name: ${{inputs.WRT_SOURCE}}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Projects
        uses: actions/checkout@main

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt -yqq purge firefox
          sudo -E apt -yqq update
          sudo -E apt -yqq full-upgrade
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E apt -yqq install dos2unix python3-netifaces libfuse-dev
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E systemctl daemon-reload
          sudo -E timedatectl set-timezone "Asia/Shanghai"

          sudo mkdir -p /mnt/build_wrt
          sudo chown $USER:$USER /mnt/build_wrt
          sudo ln -s /mnt/build_wrt $GITHUB_WORKSPACE/wrt

      - name: Initialization Values
        run: |
          echo "WRT_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV
          echo "WRT_MARK=${GITHUB_REPOSITORY%%/*}" >> $GITHUB_ENV
          echo "WRT_INFO=${WRT_SOURCE%%/*}" >> $GITHUB_ENV
          echo "WRT_TARGET=$(grep -m 1 -oP '^CONFIG_TARGET_\K[\w]+(?=\=y)' ./Config/$WRT_CONFIG.txt)" >> $GITHUB_ENV
          echo "WRT_KVER=none" >> $GITHUB_ENV
          echo "WRT_LIST=none" >> $GITHUB_ENV

      - name: Clone Code
        run: |
          git clone --depth=1 --single-branch --branch $WRT_BRANCH $WRT_REPO ./wrt/

          cd ./wrt/ && echo "WRT_HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV

          # GitHub Action 移除国内下载源
          PROJECT_MIRRORS_FILE="./scripts/projectsmirrors.json"
          if [ -f "$PROJECT_MIRRORS_FILE" ]; then
            sed -i '/.cn\//d; /tencent/d; /aliyun/d' "$PROJECT_MIRRORS_FILE"
          fi

      - name: Check Scripts
        run: |
          find ./ -maxdepth 3 -type f -iregex ".*\(txt\|sh\)$" -exec dos2unix {} \; -exec chmod +x {} \;

      - name: Check Caches
        id: check-cache
        if: env.WRT_TEST != 'true'
        uses: actions/cache@main
        with:
          key: ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}-${{env.WRT_HASH}}
          restore-keys: ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}
          path: |
            ./wrt/.ccache
            ./wrt/staging_dir/host*
            ./wrt/staging_dir/tool*

      - name: Update Caches
        if: env.WRT_TEST != 'true'
        run: |
          if [ -d "./wrt/staging_dir" ]; then
            find "./wrt/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r DIR; do
              find "$DIR" -type f -exec touch {} +
            done

            mkdir -p ./wrt/tmp && echo "1" > ./wrt/tmp/.build

            echo "toolchain skiped done!"
          else
            echo "caches missed!"
          fi

          if ${{steps.check-cache.outputs.cache-hit != 'true'}}; then
            CACHE_LIST=$(gh cache list --key "$WRT_CONFIG-$WRT_INFO" | cut -f 1)
            for CACHE_KEY in $CACHE_LIST; do
              gh cache delete $CACHE_KEY
            done

            echo "caches cleanup done!"
          fi

      - name: Update Feeds
        run: |
          cd ./wrt/

          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ▼▼▼ 新增步骤：安装Python构建依赖 ▼▼▼
      - name: Install Python Build Tools
        run: |
          cd ./wrt/
          
          echo "=== 检查构建环境 ==="
          ls -la ./staging_dir/ || echo "staging_dir目录尚未生成"
          
          # 如果hostpkg目录已存在，安装Python构建工具
          if [ -d "./staging_dir/hostpkg" ]; then
            echo "=== 安装Python构建工具到构建环境 ==="
            ./staging_dir/hostpkg/bin/pip install --upgrade pip setuptools wheel build pyproject-hooks
            echo "=== 验证安装 ==="
            ./staging_dir/hostpkg/bin/python3 -c "import pyproject_hooks, build, setuptools; print('✅ 关键Python构建模块导入成功')"
          else
            echo "=== 初始化构建工具链 ==="
            # 如果hostpkg不存在，先构建基本工具链
            make tools/install -j$(nproc) || echo "工具链构建开始..."
            # 等待片刻后重试安装
            sleep 10
            if [ -d "./staging_dir/hostpkg" ]; then
              ./staging_dir/hostpkg/bin/pip install --upgrade pip setuptools wheel build pyproject-hooks
            else
              echo "⚠️  hostpkg目录仍未就绪，将继续后续步骤"
            fi
          fi
          
          # 同时确保系统Python也有基本工具（作为备用）
          echo "=== 确保系统Python工具 ==="
          python3 -m pip install --upgrade pip setuptools wheel pyproject-hooks || true
      # ▲▲▲ 新增步骤结束 ▲▲▲

      - name: Custom Packages
        run: |
          cd ./wrt/package/

          $GITHUB_WORKSPACE/Scripts/Packages.sh
          $GITHUB_WORKSPACE/Scripts/Handles.sh

      - name: Custom Settings
        run: |
          cd ./wrt/

          if [[ "${WRT_CONFIG,,}" == *"test"* ]]; then
            cat $GITHUB_WORKSPACE/Config/$WRT_CONFIG.txt >> .config
          else
            cat $GITHUB_WORKSPACE/Config/$WRT_CONFIG.txt $GITHUB_WORKSPACE/Config/GENERAL.txt >> .config
          fi

          $GITHUB_WORKSPACE/Scripts/Settings.sh

          make defconfig -j$(nproc) && make clean -j$(nproc)

      # ▼▼▼ 修复后的步骤：修复python-frozenlist的构建命令 ▼▼▼
      - name: Fix Python Frozenlist Build Issue
        run: |
          cd ./wrt/
          
          echo "=== 开始修复 python-frozenlist 构建问题 ==="
          
          # 1. 定位Makefile文件
          FROZENLIST_MAKEFILE="./feeds/packages/lang/python/python-frozenlist/Makefile"
          echo "目标文件: $FROZENLIST_MAKEFILE"
          
          if [ ! -f "$FROZENLIST_MAKEFILE" ]; then
            echo "❌ 错误：未找到 $FROZENLIST_MAKEFILE"
            echo "尝试搜索替代路径..."
            ALT_PATH=$(find ./feeds -type f -name "Makefile" 2>/dev/null | xargs grep -l "frozenlist" 2>/dev/null | head -1)
            if [ -n "$ALT_PATH" ]; then
              FROZENLIST_MAKEFILE="$ALT_PATH"
              echo "在备用路径找到: $FROZENLIST_MAKEFILE"
            else
              echo "无法找到 python-frozenlist 的 Makefile，跳过修复。"
              exit 0  # 退出但不失败，让编译继续
            fi
          fi
          
          # 2. 备份原文件
          BACKUP_TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BACKUP_FILE="${FROZENLIST_MAKEFILE}.backup.${BACKUP_TIMESTAMP}"
          cp -f "$FROZENLIST_MAKEFILE" "$BACKUP_FILE"
          echo "已备份原文件至: $BACKUP_FILE"
          
          # 3. 核心修复：移除 `--no-isolation` 参数
          echo "正在执行修复：从构建命令中移除 '--no-isolation'..."
          
          # 使用更稳健的sed命令，避免使用复杂的正则表达式
          sed -i 's/--no-isolation //g' "$FROZENLIST_MAKEFILE"
          
          # 4. 验证修改（使用简单可靠的grep命令）
          echo "=== 验证修改结果 ==="
          
          # 检查文件中是否包含构建命令
          if grep -q "-m build" "$FROZENLIST_MAKEFILE"; then
            echo "✅ 找到构建命令。"
            echo "构建命令预览:"
            grep "-m build" "$FROZENLIST_MAKEFILE" | head -2 | sed 's/^/  /'
          else
            echo "⚠️  警告：未找到包含 '-m build' 的命令行。"
          fi
          
          # 检查是否还有残留的 --no-isolation
          if grep -q "no-isolation" "$FROZENLIST_MAKEFILE"; then
            echo "❌ 修复可能不彻底，文件中仍包含 'no-isolation' 字样。"
          else
            echo "✅ 修复完成，已成功移除 '--no-isolation' 参数。"
          fi
          
          echo -e "\n=== 修复步骤完成 ==="
      # ▲▲▲ 修复后的步骤结束 ▲▲▲


      - name: Download Packages
        if: env.WRT_TEST != 'true'
        run: |
          cd ./wrt/

          make download -j$(nproc)

      - name: Compile Firmware
        if: env.WRT_TEST != 'true'
        run: |
          cd ./wrt/

          make -j$(nproc) || make -j1 V=s

      - name: Machine Information
        run: |
          cd ./wrt/

          echo "======================="
          lscpu | grep -E "name|Core|Thread"
          echo "======================="
          df -h
          echo "======================="
          du -h --max-depth=1
          echo "======================="

      - name: Package Firmware
        run: |
          cd ./wrt/ && mkdir ./upload/

          cp -f ./.config ./upload/Config-"$WRT_CONFIG"-"$WRT_INFO"-"$WRT_BRANCH"-"$WRT_DATE".txt

          if [[ $WRT_TEST != 'true' ]]; then
            echo "WRT_KVER=$(find ./bin/targets/ -type f -name "*.manifest" -exec grep -oP '^kernel - \K[\d\.]+' {} \;)" >> $GITHUB_ENV
            echo "WRT_LIST=$(find ./bin/targets/ -type f -name "*.manifest" -exec grep -oP '^luci-(app|theme)[^ ]*' {} \; | tr '\n' ' ')" >> $GITHUB_ENV

            find ./bin/targets/ -iregex ".*\(buildinfo\|json\|sha256sums\|packages\)$" -exec rm -rf {} +

            for FILE in $(find ./bin/targets/ -type f -iname "*$WRT_TARGET*") ; do
              EXT=$(basename $FILE | cut -d '.' -f 2-)
              NAME=$(basename $FILE | cut -d '.' -f 1 | grep -io "\($WRT_TARGET\).*")
              NEW_FILE="$WRT_INFO"-"$WRT_BRANCH"-"$NAME"-"$WRT_DATE"."$EXT"
              mv -f $FILE ./upload/$NEW_FILE
            done

            find ./bin/targets/ -type f -exec mv -f {} ./upload/ \;

            make clean -j$(nproc)
          fi

      - name: Release Firmware
        uses: softprops/action-gh-release@master
        with:
          tag_name: ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}-${{env.WRT_BRANCH}}-${{env.WRT_DATE}}
          files: ./wrt/upload/*.*
          body: |
            这是个平台固件包，内含多个设备！
            请注意选择你需要的设备固件！
            不要问，刷就完事了！

            全系带开源硬件加速，别问了！

            源码：${{env.WRT_REPO}}
            分支：${{env.WRT_BRANCH}}
            提交：${{env.WRT_HASH}}

            配置：${{env.WRT_CONFIG}}
            平台：${{env.WRT_TARGET}}

            登录地址：${{env.WRT_IP}}
            登录密码：${{env.WRT_PW}}

            WIFI名称：${{env.WRT_SSID}}
            WIFI密码：${{env.WRT_WORD}}

            内核版本：${{env.WRT_KVER}}
            插件列表：${{env.WRT_LIST}}
